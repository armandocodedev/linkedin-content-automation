name: LinkedIn Content Automation with n8n

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday at 10am
  workflow_dispatch:

jobs:
  post-to-linkedin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      
      - name: Decode posts from secret
        run: |
          echo "${{ secrets.ENCODED_POSTS }}" | base64 -d > data/posts.json
      
      - name: Build and run n8n container
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          docker build -t linkedin-automation -f docker/Dockerfile .
          
          docker run --rm \
            -v $(pwd)/data:/data \
            -e LINKEDIN_ACCESS_TOKEN=$LINKEDIN_ACCESS_TOKEN \
            linkedin-automation
      
      - name: Create record of post
        run: |
          # Create record file for the repository
          if [ -f "data/last_post_info.json" ]; then
            mkdir -p content
            POST_INFO=$(cat data/last_post_info.json)
            THEME=$(echo $POST_INFO | jq -r ".theme")
            POST_ID=$(echo $POST_INFO | jq -r ".id")
            POST_DATE=$(date +%Y-%m-%d)
            
            FILENAME="content/$POST_DATE-linkedin-post.md"
            
            echo "---" > $FILENAME
            echo "theme: $THEME" >> $FILENAME
            echo "date: $POST_DATE" >> $FILENAME
            echo "post_id: $POST_ID" >> $FILENAME
            echo "status: posted" >> $FILENAME
            echo "---" >> $FILENAME
            echo "" >> $FILENAME
            echo "Post ID $POST_ID was published to LinkedIn." >> $FILENAME
            
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add $FILENAME
            git commit -m "Posted to LinkedIn: $THEME"
            git push
          fi